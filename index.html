<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Agent Wiki</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    @media screen and (max-width: 768px) {
      .sidebar-toggle {
        position: fixed;
        top: 14px;
        left: 14px;
        right: auto;
        bottom: auto;
        width: 52px;
        height: 52px;
        padding: 11px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.24);
        z-index: 40;
      }
      .sidebar-toggle span {
        background-color: #42b983;
        display: block;
        height: 3px;
        margin: 6px 0;
        width: 26px;
        border-radius: 999px;
      }
      .sidebar {
        top: 0;
        padding-top: 72px;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.04), 0 16px 40px rgba(0,0,0,0.24);
        z-index: 35;
      }
      .content {
        padding-top: 72px;
      }
    }
    #mobile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.42);
      z-index: 25;
    }
    body.close #mobile-overlay {
      display: none;
    }
    body.close .sidebar {
      transform: translateX(-300px);
    }
    body:not(.close) .sidebar + #mobile-overlay,
    body:not(.close) #mobile-overlay.active {
      display: block;
    }
    @media screen and (min-width: 769px) {
      #mobile-overlay {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="mobile-overlay"></div>
  <script>
    window.$docsify = {
      name: 'agent-wiki',
      repo: 'shdkej/agent-wiki',
      homepage: 'index.md',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      relativePath: true,
      search: {
        placeholder: '검색...',
        noData: '결과 없음',
        depth: 3
      },
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            if (window.innerWidth > 768) return;
            var overlay = document.getElementById('mobile-overlay');
            if (!overlay) return;

            function syncOverlay() {
              if (document.body.classList.contains('close')) {
                overlay.classList.remove('active');
              } else {
                overlay.classList.add('active');
              }
            }

            syncOverlay();

            overlay.onclick = function() {
              document.body.classList.add('close');
              syncOverlay();
            };

            var toggle = document.querySelector('.sidebar-toggle');
            if (toggle && !toggle.dataset.overlayBound) {
              toggle.dataset.overlayBound = 'true';
              toggle.addEventListener('click', function() {
                setTimeout(syncOverlay, 0);
              });
            }

            document.querySelectorAll('.sidebar-nav a').forEach(function(link) {
              link.classList.add('close');
              if (!link.dataset.overlayBound) {
                link.dataset.overlayBound = 'true';
                link.addEventListener('click', function() {
                  document.body.classList.add('close');
                  syncOverlay();
                });
              }
            });
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
