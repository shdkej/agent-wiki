name: Auto-generate _sidebar.md

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '!_sidebar.md'
      - 'scripts/generate_sidebar.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-sidebar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate _sidebar.md
        run: node scripts/generate_sidebar.js > _sidebar.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _sidebar.md
          git diff --staged --quiet || (
            git commit -m "chore: auto-update _sidebar.md [skip ci]"
            git push
          )
